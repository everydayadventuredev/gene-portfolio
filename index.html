<!-- Favicon -->
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

<!-- Open Graph (Facebook, LINE, etc.) -->
<meta property="og:title" content="Gene — Product Manager">
<meta property="og:description" content="軟體 PM，專注在使用者體驗、社群互動、與成長策略。也做各種有趣的東西。">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Gene — Product Manager">
<meta name="twitter:description" content="軟體 PM，專注在使用者體驗、社群互動、與成長策略。也做各種有趣的東西。">
<meta name="twitter:image" content="og-image.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet" crossorigin>
<style>
:root {
  --bg: #0c0c0e;
  --bg-raised: #141416;
  --bg-card: #19191c;
  --bg-hover: #1e1e22;
  --border: #2a2a2f;
  --border-hover: #3a3a42;
  --text: #e4e4e7;
  --text-secondary: #b0b4bf;
  --text-muted: #7d818c;
  --accent: #c8a46e;
  --accent-dim: rgba(200,164,110,0.12);
  --accent-hover: #dbb97e;
  --green: #7ec88a;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Noto Sans TC', system-ui, sans-serif;
  --font-mono: 'DM Mono', 'Menlo', monospace;
  --radius: 6px;
  --max-w: 780px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.75;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--accent);color:var(--bg)}

/* STATUS BAR */
.status-bar{position:fixed;top:0;left:0;right:0;z-index:200;height:32px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}
.status-bar .left{display:flex;gap:1.5rem}
.status-bar .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 3s infinite}
@keyframes blink{0%,90%,100%{opacity:1}95%{opacity:.3}}
.status-bar .right{display:flex;gap:1.5rem}

/* SCROLL PROGRESS BAR */
.scroll-progress{position:fixed;top:32px;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-hover));z-index:201;width:0%;transition:width .1s linear;pointer-events:none}

/* ACHIEVEMENT TOAST */
.achievement-toast{position:fixed;bottom:-80px;left:50%;transform:translateX(-50%);z-index:400;background:var(--bg-raised);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 24px;display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:13px;color:var(--text);box-shadow:0 8px 30px rgba(0,0,0,.4);transition:bottom .5s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.achievement-toast.show{bottom:2rem}
.achievement-toast .ach-icon{font-size:20px}
.achievement-toast .ach-text{color:var(--text-secondary)}
.achievement-toast .ach-label{color:var(--accent);font-weight:500}

/* TOOLTIP */
[data-tip]{position:relative}
[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) scale(.95);font-family:var(--font-mono);font-size:11px;color:var(--text);background:var(--bg-card);border:1px solid var(--border);padding:6px 12px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .2s;z-index:50}
[data-tip]:hover::after{opacity:1;transform:translateX(-50%) scale(1)}

/* NAV — FIX #3: hamburger on mobile */
nav{position:fixed;top:32px;left:0;right:0;z-index:100;height:50px;background:rgba(12,12,14,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;box-sizing:border-box;max-width:100vw;overflow:hidden}
nav .name{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text)}
nav .links{display:flex;gap:2px}
nav .links a{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-decoration:none;padding:14px 14px;border-radius:var(--radius);transition:all .2s}
nav .links a:hover{color:var(--text);background:var(--bg-hover)}
nav .links a.active{color:var(--accent)}
nav .hamburger{display:none;background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:var(--radius);transition:color .2s}
nav .hamburger:hover{color:var(--text)}

/* Mobile nav overlay */
.mobile-nav{display:none;position:fixed;top:82px;left:0;right:0;z-index:99;background:var(--bg-raised);border-bottom:1px solid var(--border);padding:1rem 1.5rem;flex-direction:column;gap:4px}
.mobile-nav.open{display:flex}
.mobile-nav a{font-family:var(--font-mono);font-size:14px;color:var(--text-secondary);text-decoration:none;padding:12px 0;border-bottom:1px solid var(--border);transition:color .2s}
.mobile-nav a:last-child{border-bottom:none}
.mobile-nav a:hover{color:var(--accent)}

main{max-width:var(--max-w);margin:0 auto;padding:120px 1.5rem 6rem}
section{margin-bottom:5rem;scroll-margin-top:100px}
.section-divider{scroll-margin-top:100px}

.section-label{font-family:var(--font-mono);font-size:14px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:2rem;display:flex;align-items:center;gap:14px;font-weight:500}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--accent),transparent 80%)}

/* ═══ FIX #4: scroll reveal ═══ */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease, transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ═══ HERO — enhanced visual anchor ═══ */
.hero{margin-bottom:5rem;position:relative;padding-top:2rem}
.hero::before{content:'';position:absolute;top:-80px;left:-160px;width:500px;height:500px;background:radial-gradient(circle,rgba(200,164,110,.08) 0%,rgba(200,164,110,.03) 40%,transparent 70%);pointer-events:none;z-index:0;animation:glowDrift 8s ease-in-out infinite alternate}
.hero::after{content:'';position:absolute;top:60px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(200,164,110,.04) 0%,transparent 60%);pointer-events:none;z-index:0;animation:glowDrift 6s ease-in-out 2s infinite alternate-reverse}
@keyframes glowDrift{from{transform:translate(0,0)}to{transform:translate(20px,10px)}}
.hero>*{position:relative;z-index:1}

.hero-monogram{display:inline-flex;align-items:center;justify-content:center;width:120px;height:120px;border:2px solid var(--accent);border-radius:50%;font-family:var(--font-display);font-size:30px;font-weight:600;color:var(--accent);margin-bottom:2rem;animation:monogramIn .8s ease both;position:relative}
.hero-monogram img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-monogram::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(200,164,110,.15);animation:ringPulse 3s ease infinite;pointer-events:none}

/* Hero photo tooltip */
.hero-monogram .photo-tip{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) scale(.95);font-family:var(--font-mono);font-size:11px;color:var(--text);background:var(--bg-card);border:1px solid var(--border);padding:6px 12px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .25s;z-index:10}
.hero-monogram:hover .photo-tip{opacity:1;transform:translateX(-50%) scale(1)}
@keyframes monogramIn{from{opacity:0;transform:scale(.8) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.08);opacity:.1}}

.hero h1{font-family:var(--font-display);font-size:clamp(36px,6vw,56px);font-weight:400;line-height:1.2;color:var(--text);margin-bottom:1.5rem}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero .subtitle{font-size:17px;color:var(--text-secondary);max-width:560px;line-height:1.9;margin-bottom:2rem}
.hero .subtitle .aside{color:var(--text-muted);font-size:14px}
.hero-ctas{display:flex;gap:10px;flex-wrap:wrap}
.hero-credentials{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);letter-spacing:.5px;margin-bottom:1.5rem}
.btn-primary{font-family:var(--font-mono);font-size:13px;color:var(--bg);background:var(--accent);border:none;padding:11px 24px;border-radius:var(--radius);cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.5px}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-ghost{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);background:none;border:1px solid var(--border);padding:11px 24px;border-radius:var(--radius);cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.5px}
.btn-ghost:hover{color:var(--text);border-color:var(--border-hover);background:var(--bg-hover)}

/* ═══ FIX #1: EXPERIENCE — better affordance ═══ */
.exp-item{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-raised);margin-bottom:12px;overflow:hidden;transition:border-color .3s}
.exp-item:hover{border-color:var(--accent)}
.exp-header{padding:1.25rem 1.5rem;cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.exp-header .left-col{flex:1}
.exp-header .role{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px}
.exp-header .company{font-size:14px;color:var(--text-secondary)}
.exp-header .date{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);white-space:nowrap;padding-top:3px}
/* chevron instead of + */
.exp-header .toggle-icon{font-size:18px;color:var(--text-muted);transition:transform .3s, color .2s;line-height:1;padding-top:2px}
.exp-item:hover .toggle-icon{color:var(--accent)}
.exp-item.open .toggle-icon{transform:rotate(180deg)}
.exp-body{padding:0 1.5rem 1.5rem;display:none}
.exp-item.open .exp-body{display:block}
.exp-body ul{list-style:none;padding:0;margin-bottom:.75rem}
.exp-body ul li{font-size:15px;color:var(--text-secondary);padding:4px 0;display:flex;align-items:baseline;gap:8px;line-height:1.85}
.exp-body ul li::before{content:'·';color:var(--accent);font-weight:bold;flex-shrink:0}
.exp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:.75rem}
.exp-tag{font-family:var(--font-mono);font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:3px;color:var(--text-muted);pointer-events:none;user-select:none}

/* ═══ PROJECTS — FIX #1 affordance + FIX #2 no overlay ═══ */
.project-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.project-grid .project-card:last-child:nth-child(odd){grid-column:1/-1}
.project-card{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-raised);padding:1.5rem 1.5rem 2.5rem;transition:all .3s;position:relative;overflow:hidden}
.project-card.expanded{padding-bottom:1.5rem}
.project-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.project-card{cursor:pointer}
.project-card.expanded{cursor:default}
.project-card.expanded .project-head{cursor:pointer}
.project-card .project-thumb{width:100%;aspect-ratio:16/10;object-fit:cover;object-position:center;border-radius:4px;border:1px solid var(--border);margin:4px 0 1.25rem;display:block;background:var(--bg-card)}
.project-card .project-thumb.portrait{aspect-ratio:auto;height:180px;object-fit:cover;object-position:center 18%}
.project-card.expanded .project-thumb{display:none}
.project-card .project-emoji{font-size:32px;margin-bottom:1rem;display:block}
.project-card h2{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--text);margin-bottom:4px}
.project-card .project-type{font-family:var(--font-mono);font-size:13px;color:var(--text-muted);margin-bottom:12px;letter-spacing:.5px}
.project-status{display:inline-block;font-family:var(--font-mono);font-size:11px;padding:2px 8px;border-radius:3px;margin-left:8px;letter-spacing:.3px;vertical-align:middle}
.project-status.live{color:#6bbfb3;border:1px solid rgba(107,191,179,.3);background:rgba(107,191,179,.08)}
.project-status.beta{color:#c8a46e;border:1px solid rgba(200,164,110,.3);background:rgba(200,164,110,.08)}
.project-status.dev{color:var(--text-muted);border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04)}
.project-card p{font-size:15px;color:var(--text-secondary);line-height:1.75;margin-bottom:14px}
.project-card .project-footer{display:flex;flex-wrap:wrap;gap:5px}
.project-card .p-tag{font-family:var(--font-mono);font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:3px;color:var(--text-muted);pointer-events:none;user-select:none}
/* expand cue — gradient fade + chevron at bottom */
.project-card .expand-cue{position:absolute;bottom:0;left:0;right:0;height:52px;background:linear-gradient(transparent,var(--bg-raised));display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;opacity:0;transition:opacity .3s}
.project-card .expand-cue .cue-chevron{font-size:18px;color:var(--text-muted);transition:transform .3s, color .3s;animation:none}
.project-card:hover .expand-cue{opacity:1}
.project-card:hover .expand-cue .cue-chevron{color:var(--accent);animation:cueFloat 1.5s ease-in-out infinite}
.project-card.expanded .expand-cue{display:none}
@keyframes cueFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

/* PROJECT EXPANDED DETAIL (inline only, no overlay) */
.project-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.project-card.expanded .project-detail{display:block}
.project-card.expanded{grid-column:1/-1;transform:none;cursor:default}
.project-card.expanded:hover{transform:none}
.project-detail .detail-row{margin-bottom:14px}
.project-detail .detail-label{font-family:var(--font-mono);font-size:12px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.project-detail .detail-text{font-size:15px;color:var(--text-secondary);line-height:1.85}
.project-detail .detail-text strong{color:var(--text);font-weight:600}
.project-detail .detail-highlights{list-style:none;padding:0}
.project-detail .detail-highlights li{font-size:15px;color:var(--text-secondary);padding:3px 0;display:flex;align-items:baseline;gap:8px}
.project-detail .detail-highlights li::before{content:'→';color:var(--accent);flex-shrink:0;font-size:12px}
.project-detail .detail-screenshot{width:100%;border-radius:var(--radius);border:1px solid var(--border);margin:12px 0}
.project-detail .detail-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}
.project-detail .detail-gallery img{width:100%;max-height:260px;object-fit:cover;object-position:top;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-card);display:block;transition:border-color .2s,transform .2s;cursor:zoom-in}
.project-detail .detail-gallery img:hover{border-color:var(--accent);transform:translateY(-2px)}
/* Lightbox */
.lightbox-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9999;cursor:zoom-out;justify-content:center;align-items:center;padding:2rem}
.lightbox-overlay.active{display:flex}
.lightbox-overlay img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px}
.project-detail .detail-links{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.project-detail .detail-link{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-decoration:none;padding:8px 18px;border:1px solid var(--accent);border-radius:var(--radius);transition:all .2s}
.project-detail .detail-link:hover{background:var(--accent);color:var(--bg)}
.project-detail .detail-close{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-decoration:none;padding:8px 18px;border:1px solid var(--border);border-radius:var(--radius);transition:all .2s;cursor:pointer;background:none}
.project-detail .detail-close:hover{color:var(--accent);border-color:var(--accent)}

/* EMPTY SLOT */
.project-card.empty-slot{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;cursor:default}
.project-card.empty-slot:hover{border-color:var(--border-hover);transform:none;box-shadow:none}
.project-card.empty-slot .slot-label{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);letter-spacing:1px}
.project-card.empty-slot .slot-icon{font-size:24px;margin-bottom:8px;opacity:.4}

/* ABOUT — simplified */
.about-content{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.about-block{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-raised);padding:1.5rem}
.about-block.full-width{grid-column:1/-1}
.about-block h3,.about-block .block-label{font-family:var(--font-mono);font-size:12px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:.75rem}
.about-block h3{font-size:14px}
.about-block p{font-size:15px;color:var(--text-secondary);line-height:1.85}
.about-block .footnote{font-size:13px;color:var(--text-muted);font-style:italic;margin-top:6px}
.about-block ul{list-style:none;padding:0}
.about-block ul li{font-size:15px;color:var(--text-secondary);padding:5px 0;display:flex;align-items:flex-start;gap:8px}
.about-block ul li .li-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:10px}
.about-block .inline-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
/* Education item: supports optional note line */
.about-block ul li.edu-item{flex-direction:column;padding:8px 0}
.about-block ul li.edu-item .edu-main{display:flex;align-items:center;gap:8px;width:100%}
.about-block ul li.edu-item .edu-school{flex:1}
.about-block ul li.edu-item .edu-period{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);white-space:nowrap}
.about-block ul li.edu-item .edu-note{font-size:13px;color:var(--text-muted);font-style:italic;margin:4px 0 0 12px}

/* ═══ SECTION DIVIDER ═══ */
.section-divider{text-align:center;margin:4rem 0;position:relative}
.section-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--border),transparent)}
.section-divider span{position:relative;background:var(--bg);padding:0 1rem;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:2px}

/* ═══ AFTER HOURS — shifted color palette ═══ */
:root{--ah-accent:#6bbfb3;--ah-accent-dim:rgba(107,191,179,.1);--ah-accent-hover:#84d4c9;--ah-bg:rgba(107,191,179,.03)}
.after-hours-section{position:relative}
.after-hours-section::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,var(--ah-bg) 30%,var(--ah-bg) 70%,transparent 100%);pointer-events:none;border-radius:12px;margin:-2rem -1rem;padding:2rem 1rem}
.after-hours-section .section-label{color:var(--ah-accent)}
.after-hours-section .section-label::after{background:linear-gradient(to right,var(--ah-accent),transparent 80%)}
.after-hours-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;position:relative;z-index:1}
.after-hours-card{border:1px solid rgba(107,191,179,.15);border-radius:var(--radius);background:var(--bg-raised);padding:1.5rem;transition:all .3s;text-decoration:none;display:block}
.after-hours-card:hover{border-color:var(--ah-accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.after-hours-card .ah-emoji{font-size:28px;margin-bottom:.75rem;display:block}
.after-hours-card .ah-title{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.after-hours-card .ah-desc{font-size:14px;color:var(--text-secondary);line-height:1.75;margin-bottom:12px}
.after-hours-card .ah-link{font-family:var(--font-mono);font-size:12px;color:var(--ah-accent);transition:color .2s}
.after-hours-card:hover .ah-link{color:var(--ah-accent-hover)}
.after-hours-tagline{font-size:14px;color:var(--text-muted);margin-bottom:1.25rem;font-style:italic;position:relative;z-index:1}

/* Writings card — clickable, opens list */
.after-hours-card.writings-card{cursor:pointer}
.writings-count{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:4px}

/* Writings overlay */
.writings-overlay{position:fixed;inset:0;z-index:300;background:rgba(10,10,14,.88);backdrop-filter:blur(10px);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:80px 1.5rem 4rem}
.writings-overlay.open{display:flex}
.writings-panel{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius);max-width:640px;width:100%;padding:2.5rem;position:relative;animation:fadeUp .4s ease both}
.writings-panel .wp-close{position:absolute;top:1rem;right:1rem;font-family:var(--font-mono);font-size:13px;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;cursor:pointer;transition:all .2s}
.writings-panel .wp-close:hover{color:var(--accent);border-color:var(--accent)}
.writings-panel .wp-title{font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--text);margin-bottom:6px}
.writings-panel .wp-desc{font-size:14px;color:var(--text-muted);margin-bottom:1rem}

/* Writings filter */
.writings-filter{display:flex;gap:6px;margin-bottom:1.25rem}
.writings-filter button{font-family:var(--font-mono);font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);background:none;color:var(--text-muted);cursor:pointer;transition:all .2s}
.writings-filter button:hover{color:var(--accent);border-color:var(--accent)}
.writings-filter button.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}

/* Writing list items */
.writing-item{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .3s}
.writing-item:hover{border-color:var(--accent)}
.writing-header{padding:1rem 1.25rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:1rem;user-select:none}
.writing-header .wh-left{flex:1}
.writing-header .wh-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text)}
.writing-header .wh-meta{display:flex;gap:12px;align-items:center;margin-top:2px}
.writing-header .wh-date{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.writing-header .wh-preview{font-size:13px;color:var(--text-muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:360px}
.writing-header .wh-cat{font-family:var(--font-mono);font-size:10px;color:var(--accent);border:1px solid var(--accent-dim);padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.writing-header .wh-chevron{font-size:16px;color:var(--text-muted);transition:transform .3s, color .2s}
.writing-item:hover .wh-chevron{color:var(--accent)}
.writing-item.open .wh-chevron{transform:rotate(180deg)}
.writing-item.open .wh-preview{display:none}
.writing-body{padding:0 1.25rem 1.25rem;display:none}
.writing-item.open .writing-body{display:block}
.writing-body .wb-content{font-size:15px;color:var(--text-secondary);line-height:2.1;white-space:pre-line;max-width:560px;margin:0 auto}

/* CONTACT — enhanced */
.contact-box{border:1px solid var(--accent);border-radius:var(--radius);background:var(--bg-raised);padding:4rem 2.5rem;text-align:center;position:relative;overflow:hidden}
.contact-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center bottom,rgba(200,164,110,.06) 0%,transparent 60%);pointer-events:none}
.contact-box>*{position:relative;z-index:1}
.contact-box h3{font-family:var(--font-display);font-size:32px;font-weight:400;color:var(--text);margin-bottom:12px}
.contact-box .contact-sub{font-size:16px;color:var(--text-secondary);margin-bottom:2.5rem;line-height:1.8}
.contact-box .contact-sub .wink{color:var(--text-muted);font-size:13px}
.contact-grid{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.contact-item{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);text-decoration:none;padding:13px 26px;border:1px solid var(--border);border-radius:var(--radius);transition:all .2s;display:flex;align-items:center;gap:8px}
.contact-item:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim);transform:translateY(-1px)}

/* FOOTER */
footer{max-width:var(--max-w);margin:0 auto;padding:2rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
footer .copy{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
footer .footer-year{cursor:pointer;transition:color .2s}
footer .footer-year:hover{color:var(--accent)}
footer .easter{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);opacity:.4;transition:opacity .3s;cursor:default}
footer .easter:hover{opacity:1}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero{animation:fadeUp .7s ease both}

/* ═══ FIX #3: RESPONSIVE — hamburger menu ═══ */
@media(max-width:640px){
  .status-bar{display:none}
  .scroll-progress{top:0}
  nav{top:0}
  nav .links{display:none}
  nav .hamburger{display:block}
  main{padding:80px 1rem 4rem}
  .hero h1{font-size:28px}
  .hero-monogram{width:96px;height:96px;font-size:24px}
  .about-content{grid-template-columns:1fr}
  .project-grid{grid-template-columns:1fr}
  .after-hours-grid{grid-template-columns:1fr}
  .writing-header .wh-preview{max-width:100%}
  .project-card.expanded{grid-column:1/-1}
  .project-card.empty-slot{min-height:80px}
  .project-detail .detail-links{flex-direction:column}
  .project-detail .detail-link,.project-detail .detail-close{text-align:center}
  .project-detail .detail-gallery{grid-template-columns:1fr}
  .achievement-toast{white-space:normal;max-width:90vw;text-align:center}
  footer{flex-direction:column;gap:8px}
}
</style>
</head>

          content: `當你開始反思工作的意義的時候，差不多就是該找下一份工作的時候了。

而當你發現工作的意義其實是賺錢為了生活，你就會發現你目前的的工作沒有那麼糟糕，只是賺的錢沒有這麼多，也沒有什麼生活罷了。

但是總比沒工作好，你從辦公桌驚醒，面無表情地繼續工作，你很累，儘管你把中午所有剩餘的時間拿去睡覺，但是十分鐘的睡眠只會讓你更累，你把手放上鍵盤，就像個殭屍一般，敲敲打打，把你的大好年華拿去換成錢，好讓你在 60 歲的時候可以享受你夢想般的生活。

你說過你的夢想是成為廚師，於是在 60 歲的時候，你天天在家下廚，你隔著手機鏡頭對自己燒的菜傻笑，那是你曾經的夢想，現在你只能煮出一盤平凡的現實。

你分心了，你滑著 IG 上別人的菜分神，那既不是你燒的，也不是你的人生，你面對的只有螢幕上密密麻麻的數字、圖表、和一些你似懂非懂的關聯性。你總是把注意力集中在螢幕右下角的時鐘，每次去廁所或是裝水回來總會先瞄一眼螢幕右下角的時間。這是你唯一的好心情的來源。一個是發現離下班越來越近，一方面是慶祝這次離開位置又打磨了多少時間。但是兩者都令你失望，現在才下午兩點多，下班遙遙無期，而你中午 10 分鐘的睡眠也打磨不出多少尿液。

你坐回去工位上，沈下去，差一點就要溺死，但是你發現還有工作沒有做完，溺死什麼的還可以再等一下，工作可不能丟，因爲你還有夢想，你的夢想就是在 60 歲的時候，做出一道跟照片上一模一樣的菜，然後用 excel 分析這道菜跟好吃程度的相關性，接著享受一個 40 分鐘的完美午覺，幸運的話，就可以這樣靜靜地消失在世界上。

然後你回來了，被老闆的訊息叫了回來，他私訊了一篇文章給你，他知道你喜歡狗，所以他傳了一篇農場文章，標題是「全世界 10 大最奇特的貓食」給你，還額外說：「看起來就跟我們吃的食物一樣」，你死氣沈沈的敲出：「真的哈哈哈，精神都被療癒了：）」。重點不是老闆有問過你是貓派還是狗派的人，重點也不是你還真的點開了連結，一張一張照片的仔細瀏覽，然後發現原來你早上滑 IG 看到很美的那張美食照，是貓食。

重點是老闆秒回了你：「對吧，另外我有另一件事想要請你幫忙回答。」

你好想要生氣，但是你沒有勇氣，也沒有力氣了。你刪掉你原本想要脫口而出的話，取而代之的是：「嘿是」

「工作的意義到底是什麼」

「下班前來我的辦公室跟我說，記得先在 google 行事曆上先約時間」

「沒有問題！」

於是你走向 25 樓唯一一面落地窗，思考這個深奧的問題，同時看看這個高度會不會感覺到痛。

哈哈哈，你會心一笑，怎麼可以下去呢，你還有工作沒做完呢！還記得嗎，工作是為了你未來的夢想啊。

你的夢想啊！就是希望週末可以去好吃的餐廳吃個長的跟 IG 照片一樣的美食對吧！可能是貓貓咖啡廳，哎呀無所謂拉，只要能看到漂亮好吃的食物就可以了，不一定要是自己做的，幸運的話，希望是陰天，這對於一個夢想而言，可能有點太奢侈了。

打掃阿姨經過，又把你從幻想中拉回來，走回位置的時候習慣性地看了一眼右下角的時間，兩點四十七分，遙遙無期。

你開始思考老闆會期待什麼樣的答案。畢竟，經驗來看往往你認為的開放式問題，老闆都有唯一性答案，而每次回過頭檢討問題時候，都會說你要「think like a boss」。這就是蛔蟲體系嗎，還是蟯蟲，你下意識地在 google 搜尋了下到底哪個才是對的，以及這些蟲子的英文與台語，還順便去 YouTube 上看了貝爾在沙漠吃蟲子的影片，然後你開始懷疑這些蟲子生存的意義，開始擔心這些蟲子是不是也迷失了自己，他們真的有完成自己的夢想嗎？

然後你發現了，時間在你分心的時候總是過得比較快，不知不覺已經快要四點了。你開始了解到時間的相對性建立在主觀的基礎上，當你對一件事情有熱情的時候，時間會過的比較快，當你對事情毫無喜愛，時間將如同烏龜漫步，每一步都深深的卡在沙流裡。

然後你開始反思工作的意義，你覺得你好像懂了什麼，你接著打開了 google 行事曆，跟老闆約了時間，你覺得你有些東西可以說了。按照慣例，發完會議邀請會需要通知老闆一聲，這個是基本禮儀。

「老闆，會議邀請已經發了，到時候見」

「今天的會議先取消吧，我相信你有個很好的答案，但是我有別的事要先處理，我們改天再約」

「豪！沒有問題，感謝！」

你是有個很不錯的答案。

開放性的錯誤答案。

你只是需要有人推你一把，不管是在落地窗前還是人生中。你只缺那一點點的初始速度，與決心。

所以你把這些經歷寫了下來，希望不久後當你又需要有人推你一把的時候，你會感謝自己，因為是你自己推了你自己，每一次，都更往落地窗外面靠近一點點，想要看清出自己的夢想。

再仔細看一點，你會發現自己的夢想其實是看到同事在上班時偷偷做的好笑梗圖，你的夢想其實是每次回座位看向右下角的時間，都看到這次好像又多打混了五分鐘，你發現上班的意義與你的夢想逐漸合而為一，你夢想著趕快下班。

於是當你又反思一次工作的意義時，你發現工作其實給了你夢想，每一次準時下班，都是一次夢想實現，然後你每次都會發現，你好像可以再多做個三個月。

我現在已經 60 歲了，在一間食物平面行銷公司上班，我負責的項目就是把好看的貓食拍上傳 IG，這就是我夢想中的生活。`,

          preview: "如果真的有一到十的打分系統的話，所有的人到最後都是七分。",
          content: `如果真的有一到十的打分系統的話，所有的人到最後都是七分。

應該說是收斂到七分。

今天遇見一個三四分的人，相處久了以後，日久生情，你開始喜歡上他的直接、熟悉他眼角那顆奇怪的痣，逐漸上升到七分。

今天認識的是一個十分的人，相處久了以後，少見多怪，你開始漸漸厭煩他的爽朗的笑聲、也看慣了他凹凸有致的身材，最後，還是回到了七分。

既然到最後都是一樣的分數，問題就只剩下，你選擇哪一種？

按照這樣的趨勢，我更喜歡緩慢爬升的感覺。這條路會越走越快樂，然後停在高點。

我相信大部分的人也是選擇緩慢爬升的這條路。我想這就是為什麼十分的人往往很孤獨，因為一般的人不太敢靠近。

要有一點缺陷，才會讓人顯得更真實。

人事接觸多了以後，發現在這個大理論背景下，有另外兩種新的可能，三分與一分。

一分出乎意料的多，我們打從心眼裡討厭這個人，他可能一開始是任何分數，但是他不小心踩到我們的地雷，或者只是不小心打出一個比較大聲的嗝，從此以後他就是一分。這就像種姓制度一樣，一旦變成了一分，除非是引入新的宗教，要不然他很難再有機會翻身。

表面上，我們還是會跟一分的人說話，因為畢竟他存在於這個量表光譜中。只是我們會在獨自一人、或者是他轉過身的時後，送給他一個中指或者是白眼。然後跟我們七分的好朋友抱怨怎麼可能這世界上會有這種生物。七分的好友會對你笑笑、不太附和，因為他也認識你說的一分生物，但是他覺得他還有七分。

在這個主觀的量表當中，我們終究會開始擔心，在別人眼中的倒影，究竟自己是幾分，時間久了會發現，其實大多數的人看我們還是七分。於是我們開始自我評價，這是一個必經之路，然後發現，在單身的時候，我們都是七分。

但是進入熱戀期之後，自己的分數會快速下降，會變成一到兩分，因爲我們相信另一半是近乎完美的存在，而且我們一體是完美的十分，另一半是九分，我們只能拿剩下的那一分。當感情久了以後，我們還是我們，一樣完美，但我看遍了你，你不是完美無瑕的，你很真實。所以你變成了七分，而我，拿走剩下的三分。

於是，三分的人就出現了，透過簡單的數學概念，極限的減法得到了一個三分的自己。我坦然面對，因為我變成了我們，我不再重要，重要的是我們，而我們是十分。

而再生活久一點以後，你會發現最後一種類型的人，他沒有辦法被打分。

這些人萬中選一，因為這些人不值得進入量表，我們對這些人的恨意已經超越了分數，看到他，我們掉頭就走，我們就是單純的不希望他出現在我們的生活中。

出乎意料的，這些人往往都曾經讓我們相信自己是三分。`,

          content: `薩提酒館 (Sotty Tavern) 的老闆開業已經將近 30 年，從來沒有人敢在他的店裡鬧事，薩提鎮附近一帶的人都有聽說過老闆的事蹟 -- 薩提鎮的倖存者，他是唯一一名在森林暴徒 (forest mob) 的入侵下活下來的人，酒館牆上的骷髏，就是暴徒首領的首級，骷髏上掛著的羽毛項鍊，正是暴徒首領的象徵。只有首領，才能配戴靈雀亮綠色的羽毛，如果細看的話，你會發現羽毛的梗上刻著歷代首領的名字。

在那場史詩戰役以後，森林暴徒銷聲匿跡，不久之後，薩提鎮逐步重建，防禦的圍牆也拆了，也有部分的人前去開墾森林，薩提酒館就是那個正準備繁榮之際開張的，久而久之，薩提酒館也成為了這附近城鎮的第一大酒館。除了一般的當地酒客外，有不少觀光客來是為了要來親眼看看這個傳說中的人物 -- 索博 (Sober) 老闆，雖然歷史已經被時間漸漸淡忘，但是這個倖存者的稱號卻一直跟著索博。

雖然大家口口聲聲說索博是英雄，但是當他每天望向牆上的骷髏頭空洞的眼窩，還是會看到刀下人們恐懼的眼睛，聽見求饒聲在耳邊迴盪。索博心裡知道，他不是英雄，他只是運氣好。

時間的推移，把這些往事逐漸埋在眾人的記憶深處。對索博來說，反而鬆了口氣，慢慢的，他不用再跟沉重的過往交手。而僅存下來的傳說名號對他最大的幫助就是沒有人敢再這裡鬧事。

直到今天。

酒館的門被大力撞開，一個大約 30 多歲的年輕人剛撞開門就倒在地上。

店內的喧囂瞬間轉為一片死寂，只有索博還在鏗鏗鏘鏘的調酒。

年輕人踉蹌著爬起來，對著吧檯大吼：「老闆，我要最貴的酒！」

  // Bind experience toggles

  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Nav active state tracking
  const navLinks = document.querySelectorAll('nav .links a');
  const sections = document.querySelectorAll('section[id]');

    });
  }, { threshold: 0.2, rootMargin: '-80px 0px -60% 0px' });
  sections.forEach(s => navObserver.observe(s));
}

// ─── Project interactions (FIX #2: no overlay) ───

function toggleProject(headOrCard, mode) {
  // headOrCard: the card itself or .project-head
  // mode: 'head' (preserve visual position) or 'button' (scroll card top into view)
  const card = headOrCard.classList.contains('project-card')
    ? headOrCard
    : headOrCard.closest('.project-card');
  if (!card || card.classList.contains('empty-slot')) return;

  const isExpanding = !card.classList.contains('expanded');

  // When expanded, only allow collapse from head click or button — not detail area
  if (!isExpanding && !mode) {
    // Check if the click originated from the head area
    const clickedHead = event && event.target && event.target.closest('.project-head');
    if (!clickedHead) return; // clicked on detail area, do nothing
  }

  if (isExpanding) {
    card.classList.add('expanded');
    requestAnimationFrame(() => {
      const cardTop = card.getBoundingClientRect().top;
      if (cardTop < 80 || cardTop > window.innerHeight * 0.4) {
        window.scrollTo({ top: window.scrollY + cardTop - 100, behavior: 'smooth' });
      }
    });
    return;
  }

  // Collapsing paths diverge:
  // - 'head' click: reader's eye is on the head, preserve its viewport position
  // - 'button' click: reader is at the bottom of the card, scroll card head back into view
  const head = card.querySelector('.project-head');

  if (mode === 'button') {
    card.classList.remove('expanded');
    requestAnimationFrame(() => {
      // Put the card head ~120px from the top (below the fixed nav)
      const headTop = head.getBoundingClientRect().top;
      window.scrollTo(window.scrollX, window.scrollY + headTop - 120);
    });
    return;
  }

  // Default: 'head' click — preserve viewport position of head
  const headTopBefore = head.getBoundingClientRect().top;
  card.classList.remove('expanded');
  requestAnimationFrame(() => {
    const headTopAfter = head.getBoundingClientRect().top;
    const delta = headTopAfter - headTopBefore;
    if (Math.abs(delta) > 1) {
      window.scrollTo(window.scrollX, window.scrollY + delta);
    }
  });
}

function collapseProject(btn) {
  event.stopPropagation();
  toggleProject(btn.closest('.project-card'), 'button');
}

// Prevent clicks inside detail area from bubbling up (belt-and-suspenders)
document.addEventListener('click', (e) => {
  if (e.target.closest('.project-detail') && !e.target.closest('.detail-close')) {
    e.stopPropagation();
  }
});

function closeMobileNav() {

// ─── Writings overlay ───

function openWritings(filterCat) {
  const w = SITE_DATA.afterHours.writings;
  if (!w || !w.pieces) return;
  const currentFilter = filterCat || 'all';

  const categories = [...new Set(w.pieces.map(p => p.category).filter(Boolean))];
  const filterBtns = `
    <div class="writings-filter">
      <button class="${currentFilter === 'all' ? 'active' : ''}" onclick="filterWritings('all')">全部 (${w.pieces.length})</button>
      ${categories.map(c => {
        const count = w.pieces.filter(p => p.category === c).length;
        return `<button class="${currentFilter === c ? 'active' : ''}" onclick="filterWritings('${c}')">${c} (${count})</button>`;
      }).join('')}
    </div>`;

  const filtered = currentFilter === 'all' ? w.pieces : w.pieces.filter(p => p.category === currentFilter);
  filtered.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  const items = filtered.map((p, i) => {
    return `
      <div class="writing-item">
        <div class="writing-header" onclick="this.parentElement.classList.toggle('open')">
          <div class="wh-left">
            <div class="wh-title">${p.title}</div>
            <div class="wh-meta">
              ${p.category ? `<span class="wh-cat">${p.category}</span>` : ''}
              ${p.date ? `<span class="wh-date">${p.date}</span>` : ''}
            </div>
            <div class="wh-preview">${p.preview}</div>
          </div>
          <span class="wh-chevron">▾</span>
        </div>
        <div class="writing-body">
          <div class="wb-content">${p.content}</div>
        </div>
      </div>`;
  }).join('');

  const overlay = document.getElementById('writingsOverlay');
  overlay.innerHTML = `
    <div class="writings-panel">
      <button class="wp-close" onclick="closeWritings()">✕ 關閉</button>
      <div class="wp-title">${w.title}</div>
      <p class="wp-desc">${w.desc}</p>
      ${filterBtns}
      ${items}
    </div>
  `;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function filterWritings(cat) {
  openWritings(cat);
}

function closeWritings() {
  document.getElementById('writingsOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('writingsOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeWritings();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeWritings();
});

render();

  document.getElementById('scrollProgress').style.width = progress + '%';
});

// ═══ HIDDEN ACHIEVEMENTS ═══
const achievements = {
  scrolledToBottom: false,
  allExpanded: false,
  projectExpanded: false,
  writingsOpened: false,
  easterEggFound: false,
  caffeineOverdose: false,
  yearRewind: false,
  allComplete: false,
};

let toastQueue = [];
let toastActive = false;

function checkAllAchievements() {
  if (achievements.allComplete) return;
  const keys = Object.keys(achievements).filter(k => k !== 'allComplete');
  const allDone = keys.every(k => achievements[k] === true);
  if (allDone) {
    achievements.allComplete = true;
    setTimeout(() => {
      showAchievement('🎖️', '<span class="ach-label">Achievement Unlocked</span> — 你找到了所有彩蛋。你確定你不是 PM 嗎？');
    }, 1500);
  }
}

function showAchievement(icon, text) {
  toastQueue.push({ icon, text });
  if (!toastActive) processToastQueue();
  setTimeout(checkAllAchievements, 4000);
}

function processToastQueue() {
  if (toastQueue.length === 0) { toastActive = false; return; }
  toastActive = true;
  const { icon, text } = toastQueue.shift();
  const toast = document.getElementById('achievementToast');
  toast.querySelector('.ach-icon').textContent = icon;
  toast.querySelector('.ach-text').innerHTML = text;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(processToastQueue, 400);
  }, 3000);
}

// Achievement: Scrolled to bottom
window.addEventListener('scroll', () => {
  if (achievements.scrolledToBottom) return;
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  if (docHeight > 0 && scrollTop / docHeight > 0.95) {
    achievements.scrolledToBottom = true;
    showAchievement('🏆', '<span class="ach-label">Achievement Unlocked</span> — 你把整頁都看完了');
  }
});

// Achievement: All experience cards expanded
const origExpToggle = document.querySelectorAll('.exp-header');
// We check after each toggle
document.addEventListener('click', (e) => {
  if (achievements.allExpanded) return;
  const header = e.target.closest('.exp-header');
  if (!header) return;
  setTimeout(() => {
    const allItems = document.querySelectorAll('.exp-item');
    const allOpen = [...allItems].every(item => item.classList.contains('open'));
    if (allOpen && allItems.length > 0) {
      achievements.allExpanded = true;
      showAchievement('📜', '<span class="ach-label">Achievement Unlocked</span> — 完整閱讀了所有工作經歷');
    }
  }, 100);
});

// Achievement: First project expanded
const origToggleProject = window.toggleProject;
window.toggleProject = function(...args) {
  origToggleProject(...args);
  const card = args[0] && args[0].classList && args[0].classList.contains('project-card')
    ? args[0]
    : (args[0] && args[0].closest ? args[0].closest('.project-card') : null);
  if (!achievements.projectExpanded && card && card.classList.contains('expanded')) {
    achievements.projectExpanded = true;
    showAchievement('🔍', '<span class="ach-label">Achievement Unlocked</span> — 發現了 Side Project 的秘密');
  }
};

// Achievement: Writings opened
const origOpenWritings = window.openWritings;
window.openWritings = function(filterCat) {
  origOpenWritings(filterCat);
  if (!achievements.writingsOpened) {
    achievements.writingsOpened = true;
    showAchievement('✍️', '<span class="ach-label">Achievement Unlocked</span> — 開始閱讀短文集');
  }
};

// Achievement: Easter egg found (footer hover)
document.addEventListener('mouseover', (e) => {
  if (achievements.easterEggFound) return;
  const easter = e.target.closest('.easter');
  if (easter) {
    achievements.easterEggFound = true;
    setTimeout(() => {
      showAchievement('🥚', '<span class="ach-label">Achievement Unlocked</span> — 找到了彩蛋（但還是沒有獎品）');
    }, 800);
  }
});

// ═══ GAMIFICATION: Caffeine click ═══
let caffeineLevel = 78;
const caffeineStages = [
  { max: 85, bar: "███████░ ", label: "" },
  { max: 92, bar: "████████░", label: "" },
  { max: 99, bar: "█████████", label: "" },
  { max: 100, bar: "☠️ overdo", label: "se" },
];

document.addEventListener('click', (e) => {
  const el = e.target.closest('#caffeineBar');
  if (!el) return;
  caffeineLevel += 7;
  if (caffeineLevel >= 100) {
    el.textContent = 'caffeine: ☠️ overdose';
    el.setAttribute('data-tip', '你殺了他');
    if (!achievements.caffeineOverdose) {
      achievements.caffeineOverdose = true;
      showAchievement('☕', '<span class="ach-label">Achievement Unlocked</span> — 咖啡因過量，但工作還沒做完');
    }
    setTimeout(() => {
      caffeineLevel = 12;
      el.textContent = 'caffeine: █░░░░░░░ 12%';
      el.setAttribute('data-tip', '重新開機中...');
      setTimeout(() => {
        el.setAttribute('data-tip', '點我補充咖啡因');
      }, 2000);
    }, 2000);
  } else {
    const filled = Math.round(caffeineLevel / 12.5);
    const empty = 8 - filled;
    el.textContent = `caffeine: ${'█'.repeat(filled)}${'░'.repeat(empty)} ${caffeineLevel}%`;
  }
});

// ═══ GAMIFICATION: Footer year rewind ═══
let currentYear = 2026;
const yearMilestones = {
  2025: "Side project 元年",
  2024: "hidol 的起點",
  2023: "WORD UP 時期",
  2022: "IFUN Singapore",
  2021: "Garena 第三年",
  2020: "疫情中營運 Free Fire",
  2019: "故事從這裡開始",
};

function rewindYear() {
  currentYear--;
  const el = document.getElementById('footerYear');
  if (currentYear < 2019) {
    el.textContent = '∞';
    if (!achievements.yearRewind) {
      achievements.yearRewind = true;
      showAchievement('⏳', '<span class="ach-label">Achievement Unlocked</span> — 回到了時間開始之前');
    }
    setTimeout(() => { currentYear = 2026; el.textContent = '2026'; }, 2500);
    return;
  }
  el.textContent = currentYear;
  if (yearMilestones[currentYear]) {
    showAchievement('📅', `<span class="ach-label">${currentYear}</span> — ${yearMilestones[currentYear]}`);
  }
}

// Lightbox for gallery images
const lightboxOverlay = document.createElement('div');
lightboxOverlay.className = 'lightbox-overlay';
lightboxOverlay.innerHTML = '<img>';
document.body.appendChild(lightboxOverlay);
lightboxOverlay.addEventListener('click', () => lightboxOverlay.classList.remove('active'));
document.addEventListener('click', (e) => {
  if (e.target.matches('.detail-gallery img')) {
    lightboxOverlay.querySelector('img').src = e.target.src;
    lightboxOverlay.classList.add('active');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') lightboxOverlay.classList.remove('active');
});
</script>
